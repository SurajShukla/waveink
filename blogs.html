
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blogs | Waveink</title>
  <!-- bootstrap cdn -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">


  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- Header -->
  <section class="blogs-page">
    <div class="container">
    <h2 class="page-title mb-1">Brainwaves & Wordstorms</h2>
    <p class="blogs-sub mb-4 pb-md-4 font-xs">Stuff we think, write, rant, and totally overthink about.</p>
  <div class="blogs-grid" id="substack-blog-feed">
  <!-- Blog tiles will be injected here -->
</div>

    <!-- Footer will be loaded here by load-components.js -->
    
    <script src="components/load-components.js"></script>
    <!-- bootstrap cdn script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"></script>

    <script>
  const feedUrl = "https://api.rss2json.com/v1/api.json?rss_url=https://waveink.substack.com/feed";
  const container = document.getElementById("substack-blog-feed");

  fetch(feedUrl)
    .then(response => response.json())
    .then(data => {
      const posts = data.items.slice(0, 6); // Limit to 6 posts

      posts.forEach(post => {
        const card = document.createElement("div");
        card.className = "blog-card";

        card.innerHTML = `
          <img src="${post.thumbnail || 'images/placeholder.jpg'}" alt="Blog Thumbnail">
          <div class="blog-content">
            <h3>${post.title}</h3>
            <p>${post.description.split(" ").slice(0, 20).join(" ")}...</p>
            <a href="${post.link}" target="_blank" class="read-more">Read more →</a>
          </div>
        `;

        container.appendChild(card);
      });
    })
    .catch(error => {
      console.error("Failed to fetch Substack feed:", error);
      container.innerHTML = `<p class="text-danger">Unable to load blog posts right now. Please check back later.</p>`;
    });
</script>


  </body>
</html>
