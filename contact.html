<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us | WaveInk</title>
  <!-- bootstrap cdn -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Include header -->
  <!--#include virtual="components/header.html" -->

    <section class="contact-hero about pb-2">
      <div class="container">
        <h2 class="page-title mb-1">Lost in the wave? 🌊</h2>
        <p class="portfolio-sub mb-0 font-xs">Send us a message — we respond faster than a seagull on fries.</p>
      </div>
    </section>

    <section class="contact-form-section about pt-0">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6">
            <form class="contact-form d-flex justify-content-start" onsubmit="return showThankYou(event)">
              <label class="form-label text-start mb-0" for="name">Name</label>
              <input type="text" id="name" name="name" placeholder="e.g., Sherlock Holmes" required class="form-control" />
      
              <label class="form-label text-start mb-0" for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="you@detective.agency" required class="form-control" />
      
              <label class="form-label text-start mb-0" for="message">Message</label>
              <textarea id="message" name="message" placeholder="Spill the beans..." required class="form-control"></textarea>
      
              <button type="submit">Send It 🚀</button>
            </form>
            <p id="thank-you" class="thank-you hidden">Message sent via carrier pigeon 🐦</p>
          </div>
        </div>
    </div>
    </section>


    <!-- Footer will be loaded here by load-components.js -->
    
    <script src="components/load-components.js"></script>
    <!-- bootstrap cdn script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

</body>
</html>
